<!DOCTYPE html>
<html>
<head>
  <title>Quickpad</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="css/98.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="NanoPad" />
  <link rel="manifest" href="/site.webmanifest" />
</head>

<body>
<script src="js/jquery.js"></script>
<script src="js/gun.js"></script>
<script src="js/sea.js"></script>
<aside>
  <ul  class="tree-view">
    <li><a href="#intro">Login</a></li>
    <li>
      <a href="#components">Notes</a>
      <ul id="notetree">
        
      </ul>
      <button id="addnote" style="display:none;" class="default">Add Note</button>
    </li>
    <li><a href="#issues-contributing-etc">Issues, Contributing, etc.</a></li>
  </ul>
</aside>
<main>
  <div id="loginPage">
    <h1>Login / Signup</h1>
    <hr>
    <p>Credentials will always be saved locally. All pasted data will be stored encrypted with PBKDF2</p>
    <div class="field-row-stacked" style="width: 200px">
      <label for="username">Username</label>
      <input id="username" type="text" value="Centipede5"/>
    </div>
    <div class="field-row-stacked" style="width: 200px">
      <label for="password">Password</label>
      <input id="password" type="password" value="password"/>
    </div>
    <br/>
    <button id="login">Login / Signup</button>
    <br/>
    <div id="loginFeedback" class="status-field-border" style="padding: 8px;display:none;"></div>
  </div>
  <div id="mainPage" style="display:none;">
    <textarea id="view" placeholder="write here..."></textarea>
  </div>
</main>
<script>
// dApp code will go here!
var gun = Gun(['http://localhost:8765/gun', 'https://try.axe.eco/gun']);
var user = gun.user();
var note, initialized = {};

document.getElementById("login").onclick = function(){
  loginFeedback.style.display="block"
  loginFeedback.innerText = "Reading graph...";
  console.log('logging in with',username.value,password.value)
  user.auth(username.value,password.value, function(e){
    console.log(e);
    if(e.err == 'Wrong user or password.'){
      loginFeedback.innerText = "User not found, creating user...";
      user.create(username.value,password.value,function(b){
        console.log(b);
      })
      loginFeedback.innerText = "User created, logging in...";
      user.auth(username.value,password.value);
      // window.switchPage();
    } else if(e.err){
      loginFeedback.innerText = "Error: " + e.err;
    } else {
      loginFeedback.innerText = "Logged in!";
    }
    // window.switchPage();

  },{});
}

window.switchPage = function(page){
  
  mainPage.style.display ="block";
  loginPage.style.display = "none";
  var noteName = location.hash.replace('#','')||1;
  note = user.get('note').get(noteName);
  
  view.value = '';
	view.oninput = () => { note.put(view.value) };
  note.on((data) => { 
    console.log("note update")
    view.value = data 
  });
  initialized[noteName] = true;
}

window.initialize = function(){
  console.log('initialized!');
  document.getElementById('addnote').style.display = "block";

  document.getElementById('addnote').onclick = function(){
    var noteName = prompt("Enter a title for your note")
    console.log('added note', noteName)
    user.get('note').get(noteName).put("");
    setTimeout(function(){window.switchPage(noteName)},500);
  }
  user.get('note').map().on(function(content,note) {
    //console.log(x,y);
    if(!document.getElementById('note-'+note)){
      document.getElementById('notetree').innerHTML += `<li id="${'note-'+note}"><a href="#${note}">${note}</a></li>`
    }
    //<li><a href="#button">Button</a></li>
  })
  window.switchPage();
}

window.addEventListener("hashchange", window.switchPage)
gun.on('auth', window.initialize);




</script>
</body>
</html>
